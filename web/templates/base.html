<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ArduPilot AI Assistant{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="header">
    <h1>ArduPilot AI Assistant</h1>
    <p class="tagline">Pre-flight parameter audit &amp; AI assistant for Plane pilots</p>
    <nav class="nav-top" aria-label="Main navigation">
      <a href="#config" class="nav-btn">Configuration</a>
      <a href="#reports" class="nav-btn">Reports</a>
      <a href="#mission" class="nav-btn">Mission</a>
      <a href="#log" class="nav-btn">Log</a>
      <a href="#assistant" class="nav-btn">AI Assistant</a>
    </nav>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>ArduPilot AI Assistant — Param comparison, reports, mission &amp; log analysis, offline AI</p>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
